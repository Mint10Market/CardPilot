# Run pending Drizzle migrations against Supabase (or any Postgres) without a local terminal.
# One-time setup: Repo → Settings → Secrets → Actions → New repository secret
#   Name: DATABASE_URL
#   Value: Supabase **Session pooler** URI from Connect (host aws-0-*.pooler.supabase.com, port 6543).
#   Do NOT use db.<ref>.supabase.co (direct) — it has no IPv4 for GitHub Actions.
# Then: Actions → "Apply database migrations" → Run workflow

name: Apply database migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Avoid ENETUNREACH to IPv6 pooler addresses on ubuntu-latest (prefer A record).
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Repository secret DATABASE_URL is not set. Add it under Settings → Secrets and variables → Actions (Supabase pooler URI, port 6543). CI failures on lint/build do not block this workflow — you can run migrations anytime."
            exit 1
          fi
          npm run db:apply
