# Optional: manually trigger a Vercel production deploy via Deploy Hook.
#
# When the Vercel project is connected to this GitHub repo, pushes to `main`
# already deploy automatically — you do NOT need to run this workflow for every push.
#
# Use this only if Git integration is broken or you want an extra deploy without a commit.
#
# Setup: Vercel → Project → Settings → Git → Deploy Hooks → Create (branch: main) → copy URL.
# GitHub → Settings → Secrets → Actions → VERCEL_DEPLOY_HOOK_URL = that URL

name: Trigger Vercel Deploy

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::Secret VERCEL_DEPLOY_HOOK_URL is not set (Repo → Settings → Secrets → Actions)."
            exit 1
          fi
          curl -sS -X POST "$HOOK_URL" \
            -H "Content-Type: application/json" \
            --fail-with-body
